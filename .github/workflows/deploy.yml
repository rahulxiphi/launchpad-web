name: Test and Deploy (launchpad-web)

on:
  push:
    branches: [main]

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Flutter 3.38.1
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.38.1"
          channel: "stable"
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run tests
        # Skip gracefully if no test directory exists yet
        run: |
          if [ -d test ]; then
            flutter test
          else
            echo "No test directory found, skipping flutter test."
          fi

      - name: Build web (release)
        # Full Dart compile + tree-shake — same as what Docker does on the VM.
        # Catches any Dart errors before wasting a 10+ min VM Docker build.
        run: |
          flutter build web --release \
            --dart-define=API_BASE_URL=http://localhost:8010/api/v1

  deploy:
    needs: test-and-build
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VM via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USERNAME }}
          # key: ${{ secrets.VM_SSH_KEY }}
          password: ${{ secrets.VM_PASSWORD }}
          connect_timeout: 60s
          timeout: 600s
          script: |
            set -e

            cd /root/launchpad-web
            git pull origin main

            # API and web intentionally share one compose project name
            # but are deployed from separate compose files.
            # This suppresses expected orphan warnings in logs.
            export COMPOSE_IGNORE_ORPHANS=1

            # Rebuild web image — --env-file passes .env.demo vars into compose substitution
            # so API_BASE_URL is correctly injected as a Docker build arg
            docker compose -p launchpad_demo -f docker-compose.demo.yml --env-file .env.demo build --no-cache web

            # Swap in the new container
            docker compose -p launchpad_demo -f docker-compose.demo.yml --env-file .env.demo up -d --force-recreate web

            # Clean up dangling images
            docker image prune -f

            # Health check with retries: container may need a few seconds
            # to become ready after recreation.
            for i in {1..20}; do
              if curl -fsS http://localhost:9010/health > /dev/null; then
                echo "Web health check passed"
                exit 0
              fi
              echo "Waiting for web health... attempt $i/20"
              sleep 3
            done

            echo "Web health check failed after retries"
            exit 1
