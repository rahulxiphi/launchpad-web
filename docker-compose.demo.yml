services:
  web:
    container_name: demo_launchpad_web
    build:
      context: .
      dockerfile: Dockerfile
      args:
        API_BASE_URL: ${API_BASE_URL}
    restart: unless-stopped
    env_file:
      - .env.demo
    ports:
      - "${WEB_HOST_PORT:-9010}:8080"
    labels:
      com.hostinger.app: "launchpad"
      com.hostinger.env: "demo"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
